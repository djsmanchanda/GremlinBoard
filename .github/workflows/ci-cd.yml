name: CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository }}-api
  WEB_IMAGE_NAME: ${{ github.repository }}-web

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "apps/api[dev]"

      - name: Lint backend
        run: python -m ruff check apps/api/gremlinboard_api apps/api/tests widgets

      - name: Compile backend
        run: python -m compileall apps/api/gremlinboard_api widgets -q

      - name: Validate widget registry
        run: |
          python - <<'PY'
          from gremlinboard_api.config import settings
          from gremlinboard_api.registry.loader import load_registry

          registry = load_registry(settings.widgets_dir)
          print(f"widget-registry-ok: {registry.size} registered")
          PY

      - name: Run backend tests
        run: python -m pytest apps/api/tests -q -p no:langsmith

  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  e2e:
    name: Playwright Smoke
    needs: [backend, frontend]
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install application dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./apps/api
          npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npx playwright test -c apps/web/playwright.config.ts

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-diagnostics-${{ github.sha }}
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 7

  publish-images:
    name: Publish OCI Images
    if: github.event_name != 'pull_request'
    needs: [backend, frontend, e2e]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API image metadata
        id: api-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Generate web image metadata
        id: web-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and publish API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}
          cache-from: type=gha,scope=gremlinboard-api
          cache-to: type=gha,mode=max,scope=gremlinboard-api

      - name: Build and publish web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
          cache-from: type=gha,scope=gremlinboard-web
          cache-to: type=gha,mode=max,scope=gremlinboard-web
