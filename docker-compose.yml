services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      GREMLINBOARD_API_HOST: 0.0.0.0
      GREMLINBOARD_DATABASE_URL: sqlite+aiosqlite:////app/data/gremlinboard.db
      GREMLINBOARD_CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - gremlinboard-data:/app/data
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_GREMLINBOARD_API_URL: ${NEXT_PUBLIC_GREMLINBOARD_API_URL:-http://localhost:8000/api}
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_GREMLINBOARD_API_URL: ${NEXT_PUBLIC_GREMLINBOARD_API_URL:-http://localhost:8000/api}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  gremlinboard-data:
